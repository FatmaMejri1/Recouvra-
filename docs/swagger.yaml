openapi: 3.0.0
info:
  title: Recouvra+ API
  description: API for managing debt recovery (clients, invoices, payments, recovery actions)
  version: 1.0.0

servers:
  - url: http://localhost:3000

tags:
  - name: Auth
  - name: Users
  - name: Clients
  - name: Invoices
  - name: Payments
  - name: RecoveryActions
  - name: Stats

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          format: password

    RegisterRequest:
      type: object
      required: [name, email, password, role]
      properties:
        name:
          type: string
        email:
          type: string
          format: email
        password:
          type: string
          format: password
        role:
          type: string
          enum: [admin, agent, viewer]

    AuthResponse:
      type: object
      properties:
        token:
          type: string
        user:
          $ref: '#/components/schemas/User'

    User:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        email:
          type: string
        role:
          type: string

    Client:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        email:
          type: string
        phone:
          type: string

    Invoice:
      type: object
      properties:
        id:
          type: string
        client:
          type: string
        amount:
          type: number
        dueDate:
          type: string
          format: date
        status:
          type: string
          enum: [pending, paid, overdue]

    Payment:
      type: object
      properties:
        id:
          type: string
        invoice:
          type: string
        amount:
          type: number
        date:
          type: string
          format: date-time
        method:
          type: string
          enum: [cash, bank_transfer, check, card]
        notes:
          type: string

    RecoveryAction:
      type: object
      required: [invoiceId, performedBy, action]
      properties:
        id:
          type: string
        invoiceId:
          type: string
          description: The ID of the associated invoice
        performedBy:
          type: string
          description: The ID of the agent who performed the action
        action:
          type: string
          enum: [call client, send email, visit client, other]
        date:
          type: string
          format: date-time
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    Stats:
      type: object
      properties:
        totalInvoices:
          type: integer
        totalClients:
          type: integer
        totalPaid:
          type: number
        totalPending:
          type: number
        totalOverdue:
          type: number
        recoveryRate:
          type: number
          description: Percentage of recovered debt

security:
  - bearerAuth: []

paths:

  # ─── AUTH ───────────────────────────────────────────────────────────────────

  /auth/register:
    post:
      tags: [Auth]
      summary: Register a new user
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: User registered successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          description: Validation error or email already taken

  /auth/login:
    post:
      tags: [Auth]
      summary: Login user
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '401':
          description: Invalid credentials

  

  
  # ─── USERS ──────────────────────────────────────────────────────────────────

  /users:
    get:
      tags: [Users]
      summary: Get all users
      responses:
        '200':
          description: List of users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/User'
    post:
      tags: [Users]
      summary: Create new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: User created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'

  /users/{id}:
    get:
      tags: [Users]
      summary: Get user by ID
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: User found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '404':
          description: User not found
    put:
      tags: [Users]
      summary: Update user
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                email:
                  type: string
                role:
                  type: string
      responses:
        '200':
          description: User updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '404':
          description: User not found
    delete:
      tags: [Users]
      summary: Delete user
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '204':
          description: User deleted
        '404':
          description: User not found

  # ─── CLIENTS ────────────────────────────────────────────────────────────────

  /clients:
    get:
      tags: [Clients]
      summary: Get all clients
      responses:
        '200':
          description: List of clients
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Client'
    post:
      tags: [Clients]
      summary: Create client
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, email]
              properties:
                name:
                  type: string
                email:
                  type: string
                  format: email
                phone:
                  type: string
      responses:
        '201':
          description: Client created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Client'

  /clients/{id}:
    get:
      tags: [Clients]
      summary: Get client by ID
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Client found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Client'
        '404':
          description: Client not found
    put:
      tags: [Clients]
      summary: Update client
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                email:
                  type: string
                  format: email
                phone:
                  type: string
      responses:
        '200':
          description: Client updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Client'
        '404':
          description: Client not found
    delete:
      tags: [Clients]
      summary: Delete client
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Client deleted
        '404':
          description: Client not found

  # ─── INVOICES ───────────────────────────────────────────────────────────────

  /invoices:
    get:
      tags: [Invoices]
      summary: Get all invoices
      responses:
        '200':
          description: List of invoices
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Invoice'
    post:
      tags: [Invoices]
      summary: Create invoice
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [client, amount, dueDate]
              properties:
                client:
                  type: string
                amount:
                  type: number
                dueDate:
                  type: string
                  format: date
                status:
                  type: string
                  enum: [pending, paid, overdue]
                  default: pending
      responses:
        '201':
          description: Invoice created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Invoice'

  /invoices/{id}:
    get:
      tags: [Invoices]
      summary: Get invoice by ID
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Invoice found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Invoice'
        '404':
          description: Invoice not found
    put:
      tags: [Invoices]
      summary: Update invoice
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                client:
                  type: string
                amount:
                  type: number
                dueDate:
                  type: string
                  format: date
                status:
                  type: string
                  enum: [pending, paid, overdue]
      responses:
        '200':
          description: Invoice updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Invoice'
        '404':
          description: Invoice not found
    delete:
      tags: [Invoices]
      summary: Delete invoice
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Invoice deleted
        '404':
          description: Invoice not found

 

  # ─── PAYMENTS ───────────────────────────────────────────────────────────────

  /payments:
    get:
      tags: [Payments]
      summary: Get all payments
      responses:
        '200':
          description: List of payments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Payment'

    post:
      tags: [Payments]
      summary: Record a payment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [invoice, amount]
              properties:
                invoice:
                  type: string
                  description: Invoice ID
                  example: 69aeab0b5de09bb6d1bba4dd
                amount:
                  type: number
                  example: 500
                method:
                  type: string
                  enum: [cash, bank transfer, check, card]
                  default: cash
                date:
                  type: string
                  format: date-time
                  example: 2026-03-09T19:43:25.714Z

      responses:
        '201':
          description: Payment recorded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Payment'
        '400':
          description: Validation error
        '404':
          description: Invoice not found

  /payments/{id}:
    get:
      tags: [Payments]
      summary: Get payment by ID
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Payment found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Payment'
        '404':
          description: Payment not found

    put:
      tags: [Payments]
      summary: Update payment
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                amount:
                  type: number
                  example: 300
                method:
                  type: string
                  enum: [cash, bank transfer, check, card]
                date:
                  type: string
                  format: date-time
      responses:
        '200':
          description: Payment updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Payment'
        '404':
          description: Payment not found

    delete:
      tags: [Payments]
      summary: Delete payment
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Payment deleted
        '404':
          description: Payment not found
  # ─── RECOVERY ACTIONS ───────────────────────────────────────────────────────

  /recovery-actions:
    get:
      tags: [RecoveryActions]
      summary: Get all recovery actions
      responses:
        '200':
          description: List of recovery actions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/RecoveryAction'
    post:
      tags: [RecoveryActions]
      summary: Create recovery action
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [invoiceId, performedBy, action]
              properties:
                invoiceId:
                  type: string
                  example: 69aeab0b5de09bb6d1bba4dd
                performedBy:
                  type: string
                  example: 69aeab0b5de09bb6d1bba4dc
                action:
                  type: string
                  enum: [call client, send email, visit client, other]
                  example: call client
                date:
                  type: string
                  format: date-time
                  example: 2026-03-09T19:43:25.714Z
      responses:
        '201':
          description: Recovery action created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RecoveryAction'

  /recovery-actions/{id}:
    get:
      tags: [RecoveryActions]
      summary: Get recovery action by ID
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Recovery action found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RecoveryAction'
        '404':
          description: Not found
    put:
      tags: [RecoveryActions]
      summary: Update recovery action
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                invoiceId:
                  type: string
                performedBy:
                  type: string
                action:
                  type: string
                  enum: [call client, send email, visit client, other]
                date:
                  type: string
                  format: date-time
      responses:
        '200':
          description: Recovery action updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RecoveryAction'
        '404':
          description: Not found
    delete:
      tags: [RecoveryActions]
      summary: Delete recovery action
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Recovery action deleted
        '404':
          description: Not found

  # ─── STATS ──────────────────────────────────────────────────────────────────

  /stats:
    get:
      tags: [Stats]
      summary: Get dashboard statistics
      responses:
        '200':
          description: Dashboard statistics
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Stats'